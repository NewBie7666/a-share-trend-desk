initial_cash: 30000
max_positions: 3
green_max_stock_position: 0.80
yellow_max_stock_position: 0.40
red_max_stock_position: 0.00
single_position_limit_green: 0.30
single_position_limit_yellow: 0.20
min_avg_amount_20d: 300000000
stop_loss_half: 0.08
stop_loss_full: 0.12
take_profit_watch: 0.25
take_profit_strong: 0.40
lot_size: 100
allow_single_lot_above_position_limit: true
stock_pool_mode: main_board_all
prefilter_min_amount: 300000000
prefilter_max_one_lot_amount: 30000
runtime_profile: fast
max_scan_symbols: 120
scan_type: main_board_prefilter
account_risk_limit: 0.025
max_same_style_candidates: 1
style_state_source: confirmed_style_pool
data_integrity:
  signal_score_weight: 0.70
  market_strength_weight: 0.20
  score_weight: 0.10
  confidence_position_multipliers:
    high: 1.0
    medium: 0.8
    low: 0.6
    very_low: 0.4
minimum_trade_guarantee:
  enabled: false
  min_candidates: 0
profiles:
  fast:
    max_scan_symbols: 120
    data_fetch:
      request_interval_seconds: 0.3
      max_retries: 2
      retry_backoff_seconds: [1, 3]
      batch_size: 30
      batch_pause_seconds: 3
  stable:
    max_scan_symbols: 300
    data_fetch:
      request_interval_seconds: 1.0
      max_retries: 3
      retry_backoff_seconds: [1, 3, 6]
      batch_size: 20
      batch_pause_seconds: 8
position_rules:
  attack:
    max_total_position: 0.80
    max_single_position: 0.30
    max_new_candidates: 3
    min_score: 70
    max_account_risk_pct: 0.030
  balanced:
    max_total_position: 0.50
    max_single_position: 0.25
    max_new_candidates: 2
    min_score: 75
    max_account_risk_pct: 0.025
  defensive:
    max_total_position: 0.30
    max_single_position: 0.20
    max_new_candidates: 1
    min_score: 78
    max_account_risk_pct: 0.015
  cash:
    max_total_position: 0.00
    max_single_position: 0.00
    max_new_candidates: 0
    min_score: 999
    max_account_risk_pct: 0.000
data_fetch:
  request_interval_seconds: 0.3
  max_retries: 2
  retry_backoff_seconds: [1, 3]
  enable_parallel_fetch: false
  max_workers: 1
  jitter_seconds: 0.3
  batch_size: 30
  batch_pause_seconds: 3
  consecutive_failure_soft_limit: 5
  consecutive_failure_soft_pause_seconds: 10
  consecutive_failure_hard_limit: 15
  min_history_days: 120
cache:
  max_cache_age_trade_days: 1
daily_signal:
  earliest_reliable_run_time: "16:30"
data_sources:
  stock_daily:
    primary: akshare_eastmoney
    fallback:
      - akshare_sina
      - local_cache
  index_daily:
    primary: akshare_sina
    fallback:
      - akshare_eastmoney
      - akshare_tencent
      - local_cache
